<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ria Lounge Cafe — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --olive: #6b7c45;
    --olive-light: #8a9e5a;
    --olive-pale: #eef2e4;
    --cream: #f5f0e8;
    --tan: #a8896a;
    --bg: #faf7f2;
    --white: #ffffff;
    --text: #2a1f14;
    --muted: #8a7a65;
    --border: #e0d8cc;
    --dark: #2a1f14;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Jost',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* ── LANG SCREEN ── */
  #lang-screen {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:var(--white); padding:2.5rem 2rem; gap:2rem;
  }
  .logo-img { width:220px; height:auto; }
  .divider { width:48px; height:1px; background:var(--olive); opacity:.45; }
  #lang-screen p {
    font-size:.7rem; letter-spacing:.3em; color:var(--muted); text-transform:uppercase;
  }
  .lang-btns { display:flex; gap:1rem; }
  .lang-btn {
    width:126px; height:46px; background:transparent;
    border:1px solid var(--olive); color:var(--olive);
    font-family:'Jost',sans-serif; font-size:.8rem; font-weight:500;
    letter-spacing:.18em; text-transform:uppercase; cursor:pointer;
    transition:all .22s ease; border-radius:2px;
  }
  .lang-btn:hover,
  .lang-btn:active { background:var(--olive); color:var(--white); }

  /* ── MENU SCREEN ── */
  #menu-screen { display:none; min-height:100vh; flex-direction:column; background:var(--bg); }

  .menu-header {
    background:var(--white); border-bottom:1px solid var(--border);
    padding:.8rem 1.25rem; position:sticky; top:0; z-index:100;
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; }
  .header-logo-img { height:46px; width:auto; }
  .lang-switch {
    background:transparent; border:1px solid var(--olive); color:var(--olive);
    font-family:'Jost',sans-serif; font-size:.68rem; letter-spacing:.14em;
    padding:5px 13px; cursor:pointer; border-radius:2px;
    text-transform:uppercase; transition:all .2s; font-weight:500;
  }
  .lang-switch:hover { background:var(--olive); color:var(--white); }

  .cat-section { padding:1.4rem 1.15rem; flex:1; }
  .cat-label {
    font-size:.62rem; letter-spacing:.32em; text-transform:uppercase;
    color:var(--muted); margin-bottom:1rem;
  }
  .cat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.8rem; }

  .cat-card {
    background:var(--white); border:1px solid var(--border); border-radius:6px;
    padding:1.1rem 1rem 1rem; cursor:pointer; transition:all .2s ease;
    display:flex; flex-direction:column; gap:.45rem;
    position:relative; overflow:hidden;
  }
  .cat-card::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
    background:var(--olive); transform:scaleX(0);
    transition:transform .25s ease; transform-origin:left;
  }
  .cat-card:hover::after,
  .cat-card:active::after { transform:scaleX(1); }
  .cat-card:hover { border-color:var(--olive); background:var(--olive-pale); }

  .cat-icon {
    width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
  }
  .cat-icon svg { width:32px; height:32px; }
  .cat-name { font-size:.84rem; font-weight:500; color:var(--text); letter-spacing:.02em; }
  .cat-count { font-size:.68rem; color:var(--muted); font-weight:300; }

  /* ── ITEM SCREEN ── */
  #item-screen { display:none; flex-direction:column; min-height:100vh; background:var(--bg); }
  .item-header {
    background:var(--white); border-bottom:1px solid var(--border);
    padding:.9rem 1.25rem; display:flex; align-items:center; gap:1rem;
    position:sticky; top:0; z-index:100;
  }
  .back-btn {
    background:transparent; border:none; color:var(--olive);
    cursor:pointer; font-size:1.25rem; display:flex; align-items:center; padding:4px; line-height:1;
  }
  .item-header-title {
    font-family:'Playfair Display',serif; font-size:1.1rem;
    font-style:italic; color:var(--dark); flex:1;
  }
  .item-list { padding:1.2rem; display:flex; flex-direction:column; gap:.7rem; }
  .menu-item {
    background:var(--white); border:1px solid var(--border); border-radius:6px;
    padding:.95rem 1.1rem; display:flex; align-items:flex-start;
    justify-content:space-between; gap:.75rem;
  }
  .item-info { flex:1; }
  .item-name { font-size:.88rem; font-weight:500; color:var(--text); margin-bottom:.22rem; line-height:1.3; }
  .item-desc { font-size:.73rem; color:var(--muted); font-weight:300; line-height:1.5; }
  .item-dot {
    width:5px; height:5px; background:var(--olive);
    border-radius:50%; margin-top:7px; flex-shrink:0;
  }
  .olive-strip { height:2px; background:var(--olive); opacity:.2; }
</style>
</head>

let currentLang = 'tr';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  renderCategories();
}
function goLang() {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('item-screen').style.display = 'none';
  document.getElementById('lang-screen').style.display = 'flex';
}
function goBack() {
  document.getElementById('item-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
}
function renderCategories() {
  const data = menuData[currentLang];
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  document.getElementById('menu-label').textContent = currentLang === 'tr' ? 'Menü' : 'Menu';
  document.getElementById('lang-btn-txt').textContent = currentLang === 'tr' ? 'EN' : 'TR';
  data.categories.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `
      <div class="cat-icon">${icons[cat.id]}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count">${cat.count} ${currentLang==='tr'?'ürün':'items'}</div>
    `;
    card.onclick = () => openCategory(cat);
    grid.appendChild(card);
  });
}
function openCategory(cat) {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('item-screen').style.display = 'flex';
  document.getElementById('item-screen-title').textContent = cat.name;
  const list = document.getElementById('item-list');
  list.innerHTML = '';
  cat.items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'menu-item';
    el.innerHTML = `
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
      </div>
      <div class="item-dot"></div>
    `;
    list.appendChild(el);
  });
}
