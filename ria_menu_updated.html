<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ria Lounge Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bark:#4b3d27;--tan:#816546;--olive:#656742;--blush:#d4c2bb;--ink:#221a11;--cream:#f0ebe4;--creamlt:#f8f4f0;--muted:#9a8a78;--divider:#e2d8d0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Jost',sans-serif;background:var(--creamlt);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes itemIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(0) rotate(-12deg)}70%{transform:scale(1.18) rotate(4deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes drawLine{from{stroke-dashoffset:var(--len,400)}to{stroke-dashoffset:0}}
@keyframes float1{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-16px) rotate(6deg)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(-5deg)}}
@keyframes float3{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-13px) rotate(3deg)}}
@keyframes float4{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-7px) rotate(-3deg)}}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.1)}}
@keyframes shimmer{0%{transform:translateX(-120%)}100%{transform:translateX(120%)}}
@keyframes logoReveal{0%{opacity:0;transform:scale(.82) translateY(14px);filter:blur(6px)}100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}}
@keyframes twinkle{0%,100%{opacity:.12;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes dogWalkR{0%{left:-120px}100%{left:calc(100vw + 120px)}}
@keyframes dogWalkL{0%{right:-100px}100%{right:calc(100vw + 100px)}}
@keyframes dogBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes tailWag{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
@keyframes earFlop{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes pawStep{0%,100%{transform:rotate(0)}25%{transform:rotate(-16deg)}75%{transform:rotate(16deg)}}

.draw-path{stroke-dasharray:var(--len,400);stroke-dashoffset:var(--len,400);animation:drawLine 2s cubic-bezier(.4,0,.2,1) forwards}

/* LANG */
#lang-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 2rem;background:var(--ink);position:relative;overflow:hidden;z-index:1}
.lang-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.lang-logo-wrap{animation:logoReveal 1.2s cubic-bezier(.22,1,.36,1) both;position:relative;z-index:2;overflow:hidden}
.lang-logo-wrap::after{content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 25%,rgba(212,194,187,.3) 50%,transparent 75%);
  animation:shimmer 3s 1.4s ease-in-out}
.logo-big{width:250px;height:auto;display:block;filter:drop-shadow(0 4px 24px rgba(101,103,66,.4))}
.logo-sm{height:48px;width:auto;display:block;filter:drop-shadow(0 2px 10px rgba(101,103,66,.35))}

.divider-ornament{display:flex;align-items:center;gap:1rem;margin:1.6rem 0 1rem;animation:fadeUp .8s .38s ease both}
.d-line{height:1px;width:55px;background:linear-gradient(90deg,transparent,var(--olive))}
.d-line.r{background:linear-gradient(90deg,var(--olive),transparent)}
.d-diamond{width:7px;height:7px;background:var(--olive);transform:rotate(45deg);flex-shrink:0;animation:pulse 2.8s ease-in-out infinite}

.lang-tagline{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;letter-spacing:.18em;color:var(--blush);text-align:center;animation:fadeUp .8s .48s ease both}
.lang-title{font-family:'Playfair Display',serif;font-size:3.6rem;font-weight:500;color:var(--cream);letter-spacing:.04em;text-align:center;line-height:1.08;margin:.6rem 0 .3rem;animation:fadeUp .9s .58s ease both}
.lang-sub{font-size:.7rem;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:2.2rem;animation:fadeUp .8s .68s ease both}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%;max-width:310px;animation:fadeUp .8s .8s ease both}
.lang-btn{padding:1.15rem;background:transparent;border:1px solid rgba(101,103,66,.5);color:var(--cream);
  font-family:'Jost',sans-serif;font-size:.84rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;
  cursor:pointer;transition:all .35s ease;position:relative;overflow:hidden}
.lang-btn::before{content:'';position:absolute;inset:0;background:rgba(101,103,66,.2);transform:scaleX(0);transform-origin:left;transition:transform .35s ease}
.lang-btn:hover::before,.lang-btn:active::before{transform:scaleX(1)}
.lang-btn:hover{border-color:var(--olive);color:var(--blush)}
.lang-btn-ru{grid-column:1/-1;padding:.9rem;border-color:rgba(101,103,66,.22);color:rgba(240,235,228,.48);font-size:.76rem}

/* MENU */
#menu-screen{display:none;min-height:100vh;flex-direction:column;position:relative;z-index:1}
.menu-header{background:var(--ink);padding:.9rem 1.2rem;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--olive)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.lang-switch-btn{background:transparent;border:1px solid rgba(101,103,66,.42);color:var(--blush);
  font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:all .22s}
.lang-switch-btn:hover{background:rgba(101,103,66,.15);border-color:var(--olive)}
.cat-section{flex:1;padding:1.8rem 1.2rem 2.5rem;position:relative;overflow:hidden}
.menu-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.section-header{display:flex;flex-direction:column;align-items:center;margin-bottom:2.2rem;text-align:center;position:relative;z-index:1}
.section-title{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:400;font-style:italic;color:var(--bark);letter-spacing:.05em;animation:fadeUp .6s ease both}
.menu-doodle{text-align:center;margin-bottom:1.5rem;position:relative;z-index:1}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;position:relative;z-index:1}
.cat-card{background:white;border:1px solid var(--divider);padding:1.5rem 1rem 1.2rem;
  cursor:pointer;transition:all .32s ease;display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:.55rem;position:relative;overflow:hidden;
  box-shadow:0 2px 12px rgba(34,26,17,.04);animation:cardIn .55s ease both}
.cat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--olive),var(--tan),var(--bark));
  transform:scaleX(0);transform-origin:center;transition:transform .4s cubic-bezier(.22,1,.36,1)}
.cat-card:hover::after,.cat-card:active::after{transform:scaleX(1)}
.cat-card:hover{box-shadow:0 8px 28px rgba(34,26,17,.13);transform:translateY(-3px);border-color:var(--blush)}
.cat-icon-wrap{width:64px;height:64px;background:var(--cream);border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:1px solid rgba(101,103,66,.22);
  flex-shrink:0;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.cat-card:hover .cat-icon-wrap{transform:scale(1.14) rotate(-5deg)}
.cat-icon-wrap svg{width:36px;height:36px}
.cat-name{font-family:'Playfair Display',serif;font-size:1.12rem;font-weight:500;color:var(--bark);line-height:1.2}
.cat-count{font-size:.65rem;color:var(--olive);font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.cat-card:nth-child(1){animation-delay:.04s}.cat-card:nth-child(2){animation-delay:.08s}
.cat-card:nth-child(3){animation-delay:.12s}.cat-card:nth-child(4){animation-delay:.16s}
.cat-card:nth-child(5){animation-delay:.20s}.cat-card:nth-child(6){animation-delay:.24s}
.cat-card:nth-child(7){animation-delay:.28s}.cat-card:nth-child(8){animation-delay:.32s}
.cat-card:nth-child(9){animation-delay:.36s}.cat-card:nth-child(10){animation-delay:.40s}

/* ITEM */
#item-screen{display:none;flex-direction:column;min-height:100vh;background:var(--creamlt);z-index:1;position:relative;overflow:hidden}
.item-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.item-header{background:var(--ink);padding:.9rem 1.2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--olive)}
.back-btn{background:transparent;border:1px solid rgba(101,103,66,.38);color:var(--blush);width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;flex-shrink:0;transition:all .22s}
.back-btn:hover{background:rgba(101,103,66,.15);border-color:var(--olive)}
.item-header-title{font-family:'Playfair Display',serif;font-size:1.38rem;font-style:italic;font-weight:400;color:var(--cream);letter-spacing:.03em;flex:1}
.item-doodle-bar{display:flex;justify-content:center;padding:.7rem 0 .2rem;position:relative;z-index:1}
.item-list{padding:1.2rem 1.2rem 3rem;display:flex;flex-direction:column;gap:.6rem;position:relative;z-index:1}
.menu-item{background:white;border:1px solid var(--divider);border-left:3px solid var(--olive);
  padding:1rem 1.1rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.8rem;
  transition:all .28s ease;animation:itemIn .38s ease both;position:relative;overflow:hidden}
.menu-item::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(101,103,66,.05),transparent 55%);opacity:0;transition:opacity .28s}
.menu-item:hover::before{opacity:1}
.menu-item:hover{border-left-color:var(--tan);box-shadow:0 4px 18px rgba(34,26,17,.09)}
.item-info{flex:1}
.item-name{font-family:'Playfair Display',serif;font-size:1.12rem;font-weight:400;color:var(--bark);margin-bottom:.22rem;line-height:1.3}
.item-name-tr{font-size:.78rem;color:var(--muted);font-family:'Jost',sans-serif;font-style:italic;line-height:1.4}
.item-desc{font-size:.73rem;color:var(--muted);font-weight:300;line-height:1.48;margin-top:.18rem}
.item-leaf-icon{flex-shrink:0;margin-top:4px;opacity:.45;transition:transform .3s ease,opacity .3s}
.menu-item:hover .item-leaf-icon{transform:rotate(18deg) scale(1.25);opacity:.72}

/* FOOTER */
.menu-footer{padding:1.6rem 1rem;text-align:center;border-top:1px solid var(--divider);margin-top:auto;position:relative;z-index:1}
.footer-text{font-family:'Playfair Display',serif;font-size:.9rem;font-style:italic;color:var(--muted);letter-spacing:.04em;cursor:default;user-select:none}
.footer-flourish{display:block;margin:0 auto .7rem}

/* EASTER EGG DOGS */
#easter-dogs{position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:998;height:90px;display:none}
.dog-r{position:absolute;bottom:8px;animation:dogWalkR linear forwards}
.dog-l{position:absolute;bottom:8px;transform:scaleX(-1);animation:dogWalkL linear forwards}
.dog-inner{animation:dogBob .38s ease-in-out infinite alternate}
.tail{animation:tailWag .28s ease-in-out infinite alternate;transform-origin:0 50%}
.ear{animation:earFlop .44s ease-in-out infinite alternate}
.paw1{animation:pawStep .32s ease-in-out infinite alternate}
.paw2{animation:pawStep .32s .1s ease-in-out infinite alternate-reverse}
.paw3{animation:pawStep .32s .06s ease-in-out infinite alternate}
.paw4{animation:pawStep .32s .16s ease-in-out infinite alternate-reverse}
</style>
</head>
<body>

<!-- EASTER EGG -->
<div id="easter-dogs">
  <!-- Dalmatian: black & white spotted -->
  <div class="dog-r" id="dal" style="animation-duration:15s">
    <div class="dog-inner">
    <svg width="96" height="72" viewBox="0 0 96 72" fill="none">
      <ellipse cx="44" cy="44" rx="30" ry="17" fill="white" stroke="#222" stroke-width="1.6"/>
      <ellipse cx="36" cy="40" rx="5.5" ry="4.5" fill="#111" opacity=".85"/>
      <ellipse cx="53" cy="46" rx="4.5" ry="4" fill="#111" opacity=".78"/>
      <ellipse cx="29" cy="48" rx="3.5" ry="3" fill="#111" opacity=".72"/>
      <ellipse cx="58" cy="38" rx="3.5" ry="3" fill="#111" opacity=".7"/>
      <ellipse cx="44" cy="53" rx="3" ry="2.5" fill="#111" opacity=".65"/>
      <!-- head -->
      <ellipse cx="74" cy="33" rx="15" ry="14" fill="white" stroke="#222" stroke-width="1.6"/>
      <ellipse cx="76" cy="31" rx="6" ry="5" fill="#111" opacity=".72"/>
      <!-- ear -->
      <ellipse cx="79" cy="22" rx="8" ry="5.5" fill="#999" class="ear"/>
      <!-- eye -->
      <circle cx="78" cy="29" r="2.5" fill="#111"/>
      <circle cx="79" cy="28.4" r=".8" fill="white"/>
      <!-- nose -->
      <ellipse cx="87" cy="36" rx="3.5" ry="2.5" fill="#111"/>
      <ellipse cx="86.5" cy="35.4" r="1.1" fill="white" opacity=".45"/>
      <path d="M87 38 Q89.5 40.5 92 38" stroke="#111" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <!-- tongue -->
      <ellipse cx="90.5" cy="41" rx="2.8" ry="3.2" fill="#e87070"/>
      <!-- legs -->
      <rect x="21" y="57" width="7" height="14" rx="3.5" fill="white" stroke="#222" stroke-width="1.3" class="paw1"/>
      <rect x="32" y="57" width="7" height="14" rx="3.5" fill="white" stroke="#222" stroke-width="1.3" class="paw2"/>
      <rect x="51" y="57" width="7" height="14" rx="3.5" fill="white" stroke="#222" stroke-width="1.3" class="paw3"/>
      <rect x="62" y="57" width="7" height="14" rx="3.5" fill="white" stroke="#222" stroke-width="1.3" class="paw4"/>
      <circle cx="24" cy="59" r="2.2" fill="#111" opacity=".55"/>
      <circle cx="54" cy="59" r="2" fill="#111" opacity=".5"/>
      <!-- tail -->
      <path d="M14 42 Q5 31 9 19 Q11 12 16 17" stroke="#222" stroke-width="3.5" stroke-linecap="round" fill="none" class="tail"/>
    </svg>
    </div>
  </div>
  <!-- Pomeranian: fluffy white -->
  <div class="dog-l" id="pom" style="animation-duration:12s;animation-delay:7s;right:-90px">
    <div class="dog-inner" style="animation-duration:.33s">
    <svg width="80" height="68" viewBox="0 0 80 68" fill="none">
      <!-- fluffy body puffs -->
      <ellipse cx="38" cy="42" rx="24" ry="16" fill="white" stroke="#e0e0e0" stroke-width="1"/>
      <ellipse cx="24" cy="37" rx="8" ry="6" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="52" cy="37" rx="8" ry="6" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="38" cy="32" rx="9" ry="6" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="22" cy="45" rx="7" ry="4.5" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="54" cy="45" rx="7" ry="4.5" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="38" cy="52" rx="8" ry="5" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <!-- head big fluffy -->
      <circle cx="60" cy="29" r="17" fill="white" stroke="#e0e0e0" stroke-width="1"/>
      <ellipse cx="50" cy="18" rx="9" ry="7" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="70" cy="18" rx="8" ry="6" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="46" cy="29" rx="7" ry="5.5" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="74" cy="29" rx="7" ry="5.5" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <ellipse cx="60" cy="14" rx="9" ry="6" fill="white" stroke="#e0e0e0" stroke-width=".9"/>
      <!-- eyes -->
      <circle cx="55" cy="27" r="3.2" fill="#111"/>
      <circle cx="65" cy="27" r="3.2" fill="#111"/>
      <circle cx="56" cy="26.2" r="1.1" fill="white"/>
      <circle cx="66" cy="26.2" r="1.1" fill="white"/>
      <!-- nose -->
      <ellipse cx="60" cy="33" rx="3.2" ry="2.3" fill="#111"/>
      <ellipse cx="59.5" cy="32.4" r="1" fill="white" opacity=".45"/>
      <path d="M57 35 Q60 38.5 63 35" stroke="#111" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <!-- tiny ears -->
      <path d="M51 15 L54 7 L58 15" fill="white" stroke="#e0e0e0" stroke-width=".9" class="ear"/>
      <path d="M65 14 L68 6 L72 14" fill="white" stroke="#e0e0e0" stroke-width=".9" style="animation:earFlop .44s .2s ease-in-out infinite alternate"/>
      <!-- legs -->
      <rect x="19" y="53" width="6.5" height="14" rx="3.2" fill="white" stroke="#e0e0e0" stroke-width=".9" class="paw1"/>
      <rect x="28" y="53" width="6.5" height="14" rx="3.2" fill="white" stroke="#e0e0e0" stroke-width=".9" class="paw2"/>
      <rect x="44" y="53" width="6.5" height="14" rx="3.2" fill="white" stroke="#e0e0e0" stroke-width=".9" class="paw3"/>
      <rect x="53" y="53" width="6.5" height="14" rx="3.2" fill="white" stroke="#e0e0e0" stroke-width=".9" class="paw4"/>
      <!-- huge fluffy tail -->
      <ellipse cx="14" cy="36" rx="12" ry="10" fill="white" stroke="#e0e0e0" stroke-width=".9" class="tail"/>
      <ellipse cx="9" cy="34" rx="8" ry="7" fill="white" stroke="#e0e0e0" stroke-width=".8"/>
    </svg>
    </div>
  </div>
</div>

<!-- LANG SCREEN -->
<div id="lang-screen">

function leaf(x,y,rx,ry,rot,col,anim,delay,op){
  op = op||.55;
  var st = 'animation:'+anim+' ease-in-out infinite'+(delay?';animation-delay:'+delay:'');
  return '<ellipse cx="'+x+'" cy="'+y+'" rx="'+rx+'" ry="'+ry+'" fill="'+col+'" opacity="'+op+'" transform="rotate('+rot+' '+x+' '+y+')" style="'+st+'"/>';
}
function stem(d,col,delay){
  var st = '--len:200'+(delay?';animation-delay:'+delay:'');
  return '<path class="draw-path" style="'+st+'" d="'+d+'" stroke="'+col+'" stroke-width="1.6" stroke-linecap="round" fill="none" opacity=".12"/>';
}
function twink(x,y,r,col,delay){
  var st = 'animation:twinkle 4s ease-in-out infinite'+(delay?';animation-delay:'+delay:'');
  return '<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="'+col+'" opacity=".1" style="'+st+'"/>';
}

var lang='tr', cat=null;

// ── EASTER EGG ──
var taps=0, tapT=null, dogsOn=false;
function showDogs(){
  if(dogsOn)return; dogsOn=true;
  var d=document.getElementById('easter-dogs'); d.style.display='block';
  var dal=document.getElementById('dal'), pom=document.getElementById('pom');
  dal.style.left='-110px'; dal.style.animation='dogWalkR 15s linear forwards';
  pom.style.right='-90px'; pom.style.animation='dogWalkL 12s 7s linear forwards';
  setTimeout(function(){d.style.display='none';dogsOn=false;},22000);
}
function footTap(){taps++;clearTimeout(tapT);tapT=setTimeout(function(){taps=0;},700);if(taps>=3){taps=0;showDogs();}}

// ── INIT ──
window.addEventListener('DOMContentLoaded',function(){
  document.getElementById('lang-bg').innerHTML=buildLangBg();
  document.getElementById('footer-text').addEventListener('click',footTap);
  setTimeout(showDogs,12000);
});

function openMenu(l){
  lang=l;
  document.getElementById('lang-screen').style.display='none';
  document.getElementById('menu-screen').style.display='flex';
  document.getElementById('menu-doodle').innerHTML=STRIP_SVG;
  document.getElementById('menu-bg').innerHTML=buildMenuBg();
  renderMenu();
}

function renderMenu(){
  var U=UI[lang];
  document.getElementById('menu-label').textContent=U.lbl;
  document.getElementById('lang-switch').textContent=U.btn;
  document.getElementById('footer-text').textContent=U.foot;
  var grid=document.getElementById('cat-grid'); grid.innerHTML='';
  var cw=lang==='ru'?'позиции':lang==='en'?'items':'çeşit';
  DATA.categories.forEach(function(c,i){
    var card=document.createElement('div'); card.className='cat-card';
    card.style.animationDelay=(i*.05)+'s';
    card.innerHTML='<div class="cat-icon-wrap">'+(ICONS[c.icon]||ICONS.drinks)+'</div><div class="cat-name">'+c[lang]+'</div><div class="cat-count">'+c.items.length+' '+cw+'</div>';
    card.addEventListener('click',function(){openCat(c);});
    grid.appendChild(card);
  });
}

function openCat(c){
  cat=c;
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('item-screen').style.display='flex';
  document.getElementById('item-title').textContent=c[lang];
  document.getElementById('item-doodle').innerHTML=ITEM_DIVIDER;
  document.getElementById('item-bg').innerHTML=buildItemBg();
  var list=document.getElementById('item-list'); list.innerHTML='';
  c.items.forEach(function(item,i){
    var div=document.createElement('div'); div.className='menu-item';
    div.style.animationDelay=(i*.038)+'s';
    var main=item[lang]||item.en;
    var alt=lang!=='tr'?(item.tr||''):(item.en||'');
    var desc=item.desc?(item.desc[lang]||item.desc.en):'';
    div.innerHTML='<div class="item-info"><div class="item-name">'+main+'</div>'+(alt?'<div class="item-name-tr">'+alt+'</div>':'')+(desc?'<div class="item-desc">'+desc+'</div>':'')+'</div>'+LEAF_ICON;
    list.appendChild(div);
  });
}

function goBack(){
  document.getElementById('item-screen').style.display='none';
  document.getElementById('menu-screen').style.display='flex';
}

function cycleLang(){
  var idx=langs.indexOf(lang);
  lang=langs[(idx+1)%langs.length];
  if(cat){openCat(cat);document.getElementById('item-title').textContent=cat[lang];}
  else renderMenu();
}
